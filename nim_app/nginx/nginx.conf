worker_processes auto;

# Limit open files per worker to handle high concurrency
worker_rlimit_nofile 65535;

events {
    # 1024 to 4096 depending on expected loads, handling 200 concurrent easily
    worker_connections 4096;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Tuning timeouts
    keepalive_timeout 65;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Upstream configuration for NVIDIA NIM nodes
    # We will define a pool of our deployed NIM containers/servers
    upstream nim_inference_nodes {
        # Using least_conn to distribute traffic to the node with the fewest active connections
        least_conn;
        
        # Replace these IPs/ports with the actual internal network addresses of your NVIDIA NIM containers or servers
        server 127.0.0.1:8001 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8002 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8003 max_fails=3 fail_timeout=30s;
        # server nim-node-4:8000;
        
        # Add a keepalive pool for persistent connections to upstream
        keepalive 32;
    }

    server {
        listen 8000;
        
        # Optimize for streaming response (SSE for AI text generation)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Increase proxy timeouts for long generation processes
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;

        # Disable buffering to allow streaming tokens instantly to the client
        proxy_buffering off;
        proxy_cache off;

        location / {
            # Route traffic to the upstream block
            proxy_pass http://nim_inference_nodes;
            
            # Preserve client IPs
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
